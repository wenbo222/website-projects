<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../components/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <script type="module" src="../components/global-header.js"></script>
    <link rel="stylesheet" href="../global-styles.css">
</head>
<style>
    main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        max-width: 500px;
        margin: 0 auto;
        padding: 0 1rem;
    }
    .input-section {
        display: flex;
        gap: 0.5rem;
        width: 100%;
    }
    #text-input {
        flex: 1;
        padding: 0.75rem 1rem;
        border-radius: 10px;
        border: 2px solid var(--border-color);
        color: var(--page-text);
        font-size: 1rem;
        transition: border-color 0.2s;
    }
    #text-input:focus {
        outline: none;
        border-color: var(--primary-color);
    }
    .options-group {
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;
        gap: 1rem;
    }
    .option-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--container-bg);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        white-space: nowrap;
    }
    #result {
        margin-top: 1rem;
        font-size: 1.2rem;
        font-weight: 600;
        text-align: center;
    }
</style>
<body>
    <global-header></global-header>
    <h1 id="title">Palindrome Checker</h1>
    <main>
        <div class="input-section">
            <input type="text" id="text-input" placeholder="Enter a word...">
            <button id="check-btn">Check</button>
        </div>
        
        <div class="options-group">
            <div class="option-item">
                <label for="case-insensitive">Case Insensitive</label>
                <input type="checkbox" id="case-insensitive">
            </div>
            <div class="option-item">
                <label for="ignore-spaces">Ignore Spaces</label>
                <input type="checkbox" id="ignore-spaces">
            </div>
            <div class="option-item">
                <label for="ignore-punctuation">Ignore Punctuation</label>
                <input type="checkbox" id="ignore-punctuation">
            </div>
        </div>
        
        <p id="result"></p>
    </main>
</body>
<script>
    const textInput = document.getElementById("text-input");
    const checkBtn = document.getElementById("check-btn");
    const result = document.getElementById("result");
    const caseInsensitive = document.getElementById("case-insensitive");
    const ignoreSpaces = document.getElementById("ignore-spaces");
    const ignorePunctuation = document.getElementById("ignore-punctuation");

    checkBtn.addEventListener("click", () => {
        let text = textInput.value;
        if (caseInsensitive.checked) {
            text = text.toLowerCase();
        }
        if (ignoreSpaces.checked) {
            text = text.replace(/\s/g, "");
        }
        if (ignorePunctuation.checked) {
            text = text.replace(/[^a-zA-Z0-9]/g, "");
        }
        if (text===text.split("").reverse().join("")) {
            result.textContent = `It is a palindrome!`;
        } else {
            result.textContent = `It is not a palindrome.`;
        }
    });
</script>
</html>
