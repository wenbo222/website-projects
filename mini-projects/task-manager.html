<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../components/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <script type="module" src="../components/global-header.js"></script>
    <link rel="stylesheet" href="../global-styles.css">
</head>
<style>
    /* General styling */
    main {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        max-width: 31.25rem;
        margin: 0 auto 3rem;
        padding: 0 1rem;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1rem;
    }

    /* Filters */
    .task-filters {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        margin: 1rem 0;
    }
    .filter-btn {
        background-color: transparent;
        color: var(--page-text);
        border: 1px solid var(--border-color);
    }
    .filter-btn.active {
        background-color: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
    }

    /* Task List and Items */
    #task-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }
    .task-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        background: var(--container-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        gap: 1rem;
    }
    .task-item.completed {
        opacity: 0.6;
    }
    .task-content {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex: 1;
    }
    .task-checkbox {
        width: 1.2rem;
        height: 1.2rem;
        cursor: pointer;
    }
    .task-details {
        display: flex;
        flex-direction: column;
    }
    .task-item-title {
        font-weight: 600;
        margin: 0;
        padding: 0;
    }
    .completed .task-item-title {
        text-decoration: line-through;
    }
    .task-item-desc {
        font-size: 0.9rem;
        opacity: 0.8;
        margin: 0.25rem 0 0;
        padding: 0;
    }
    .task-item-due {
        font-size: 0.8rem;
        opacity: 0.6;
        margin-top: 0.25rem;
        padding: 0;
    }
    .delete-btn {
        background-color: var(--secondary-color);
    }
    .delete-btn:hover:not(:disabled) {
        background-color: var(--secondary-hover);
    }
    .empty-state {
        text-align: center;
        opacity: 0.5;
        font-style: italic;
        padding: 1rem;
    }
</style>
<body>
    <global-header></global-header>
    <h1 id="title">Task Manager</h1>
    <main>
        <form id="task-form">
            <div class="form-group">
                <label for="task-title">Task Title:</label>
                <input type="text" id="task-title" required placeholder="Enter task title... (required)">
            </div>
            <div class="form-group">
                <label for="task-desc">Description:</label>
                <textarea id="task-desc" rows="3" placeholder="Enter task description..."></textarea>
            </div>
            <div class="form-group">
                <label for="task-due">Due Date:</label>
                <input type="date" id="task-due">
            </div>
            <button type="submit">Add Task</button>
        </form>
        <div>
            <div class="task-filters">
                <button type="button" class="filter-btn active" data-filter="all">All</button>
                <button type="button" class="filter-btn" data-filter="pending">Pending</button>
                <button type="button" class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <ul id="task-list"></ul>
        </div>
    </main>
</body>
<script>
    let tasks = [];
    let currentFilter = 'all';
    
    const taskForm = document.getElementById('task-form');
    const taskTitleInput = document.getElementById('task-title');
    const taskDescInput = document.getElementById('task-desc');
    const taskDueInput = document.getElementById('task-due');
    const taskList = document.getElementById('task-list');
    const filterButtons = document.querySelectorAll('.filter-btn');
    
    /**
     * Loads tasks from localStorage and renders them on screen.
     */
    function loadTasks() {
        try {
            tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        } catch (e) {
            tasks = [];
        }
        renderTasks();
    }
    
    /**
     * Saves tasks to localStorage.
     */
    function saveTasks() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }
    
    /**
     * Renders the tasks to the DOM.
     */
    function renderTasks() {
        taskList.innerHTML = '';
        const filteredTasks = tasks.filter(task => {
            if (currentFilter==='pending') return !task.completed;
            if (currentFilter==='completed') return task.completed;
            return true;
        });
        
        if (filteredTasks.length===0) { // no tasks to display
            const emptyState = document.createElement('li');
            emptyState.className = 'empty-state';
            if (currentFilter==='all') {
                emptyState.textContent = 'No tasks yet.';
            } else if (currentFilter==='pending') {
                emptyState.textContent = 'No pending tasks.';
            } else {
                emptyState.textContent = 'No completed tasks.';
            }
            emptyState.textContent += ' Add one above!';
            taskList.appendChild(emptyState);
            return;
        }
        
        // Sort: pending first, then completed. Sort by due dates (ascending) within each group.
        filteredTasks.sort((a, b) => {
            if (a.completed!==b.completed) return a.completed ? 1 : -1;
            if (!a.due && b.due) return 1;
            if (a.due && !b.due) return -1;
            if (a.due && b.due) return new Date(a.due)-new Date(b.due);
            return b.id-a.id;
        });
        
        filteredTasks.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'task-content';
            
            // Create and add checkbox
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'task-checkbox';
            checkbox.checked = task.completed;
            checkbox.addEventListener('change', () => toggleTask(task.id));
            
            // Create and add details div, including title (required), description, and due date (optional)
            const detailsDiv = document.createElement('div');
            detailsDiv.className = 'task-details'; 
            const title = document.createElement('h3');
            title.className = 'task-item-title';
            title.textContent = task.title; 
            detailsDiv.appendChild(title);
            if (task.desc) {
                const desc = document.createElement('p');
                desc.className = 'task-item-desc';
                desc.textContent = task.desc;
                detailsDiv.appendChild(desc);
            }
            if (task.due) {
                const due = document.createElement('span');
                due.className = 'task-item-due';
                const dueDate = new Date(task.due+'T00:00:00');
                due.textContent = `Due: ${dueDate.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' })}`;
                detailsDiv.appendChild(due);
            }
            contentDiv.appendChild(checkbox);
            contentDiv.appendChild(detailsDiv);
            li.appendChild(contentDiv);
            
            // Create and add delete button
            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = 'Delete';
            deleteBtn.addEventListener('click', () => deleteTask(task.id));
            li.appendChild(deleteBtn);
            taskList.appendChild(li);
        });
    }
    
    /**
     * Adds a new task to the task list.
     * @param {Event} e - An event object.
     */
    function addTask(e) {
        e.preventDefault();
        const title = taskTitleInput.value.trim();
        if (!title) return;
        
        tasks.push({
            id: Date.now(),
            title,
            desc: taskDescInput.value.trim(),
            due: taskDueInput.value,
            completed: false
        });
        
        saveTasks();
        renderTasks();
        taskForm.reset();
    }
    
    /**
     * Toggles a task between pending and completed.
     * @param {number} id - The ID of the task to toggle.
     */
    function toggleTask(id) {
        tasks = tasks.map(t => t.id===id ? { ...t, completed: !t.completed } : t);
        saveTasks();
        renderTasks();
    }
    
    /**
     * Deletes a task from the task list.
     * @param {number} id - The ID of the task to delete.
     */
    function deleteTask(id) {
        tasks = tasks.filter(t => t.id!==id);
        saveTasks();
        renderTasks();
    }
    
    taskForm.addEventListener('submit', addTask);
    
    // Add event listeners to filter buttons
    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            filterButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderTasks();
        });
    });
    
    loadTasks();
</script>
</html>
