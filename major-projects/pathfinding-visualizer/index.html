<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../../components/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinding Visualizer</title>
    <script type="module" src="../../components/global-header.js"></script>
    <link rel="stylesheet" href="../../global-styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <global-header></global-header>    
    <main>
        <h1 id="title">Pathfinding Visualizer</h1>
        <div class="controls-panel">
            <div class="mode-selector">
                <button type="button" id="btn-start-mode">Set Start Node</button>
                <button type="button" id="btn-end-mode">Set End Node</button>
                <button type="button" id="btn-wall-mode" class="active">Paint Walls</button>
            </div>
            <div class="action-buttons">
                <button type="button" id="btn-visualize">Visualize BFS</button>
                <button type="button" id="btn-reset">Reset</button>
            </div>
        </div>
        <div class="info-banner" id="info-text">Click and drag on the grid to paint walls.</div>
        <div id="grid"></div>
    </main>
    <script type="module" src="main.js"></script>
</body>
</html>
