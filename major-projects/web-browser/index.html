<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../../components/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Browser</title>
    <script type="module" src="../../components/global-header.js"></script>
    <link rel="stylesheet" href="../../global-styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <global-header></global-header>
    <main>
        <form id="url-form" class="url-bar">
            <input type="text" id="url-input" placeholder="Enter web HTTPS URL (e.g. example.com)" required>
            <button type="submit">Go</button>
        </form>
        <div class="viewport-container">
            <iframe id="browser-viewport" title="Web browser viewport" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
    </main>
    <script src="browser.js"></script>
</body>
</html>
